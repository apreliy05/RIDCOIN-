<!DOCTYPE html>
<html>
<head>
    <title>ОСОФЕРМ ПРО</title>
    <style>
        /* Обновленные стили */
        :root {
            --primary-color: #2e7d32;
            --secondary-color: #2196f3;
            --danger-color: #e74c3c;
            --warning-color: #fbc02d;
        }
        
        body {
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 0;
            background: url('https://images.unsplash.com/photo-1500382017468-9049fed747ef?ixlib=rb-1.2.1&auto=format&fit=crop&w=1350&q=80') no-repeat center center fixed;
            background-size: cover;
            text-align: center;
            color: #fff;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.8);
        }
        
        #game-container {
            max-width: 800px;
            margin: 20px auto;
            background: rgba(255, 255, 255, 0.9);
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 0 25px rgba(0,0,0,0.3);
            color: #333;
            text-shadow: none;
            backdrop-filter: blur(3px);
            border: 1px solid rgba(255,255,255,0.3);
        }
        
        /* Добавим вкладки */
        .tabs {
            display: flex;
            margin-bottom: 20px;
            border-bottom: 2px solid #eee;
        }
        
        .tab {
            padding: 10px 20px;
            cursor: pointer;
            background: #f5f5f5;
            margin-right: 5px;
            border-radius: 5px 5px 0 0;
            transition: all 0.3s;
        }
        
        .tab.active {
            background: var(--primary-color);
            color: white;
        }
        
        .tab-content {
            display: none;
        }
        
        .tab-content.active {
            display: block;
        }
        
        /* Остальные стили оставляем из предыдущей версии, дополняем новыми */
        /* ... */
    </style>
</head>

        <div class="tabs">
            <div class="tab active" onclick="openTab('farm')">Ферма</div>
            <div class="tab" onclick="openTab('market')">Магазин</div>
            <div class="tab" onclick="openTab('upgrades')">Улучшения</div>
            <div class="tab" onclick="openTab('stats')">Статистика</div>
        </div>
        
        <!-- Вкладка Фермы -->
        <div id="farm" class="tab-content active">
            <!-- Содержимое фермы из предыдущей версии -->
        </div>
        
        <!-- Новая вкладка Магазина -->

            <div class="seed-shop" id="seed-shop">
                <!-- Товары будут добавляться через JS -->

        </div>
        
        <!-- Вкладка Улучшений -->

            <div class="upgrades-list" id="upgrades-list">
                <!-- Улучшения будут добавляться через JS -->

        </div>
        
        <!-- Вкладка Статистики -->
        <div id="stats" class="tab-content">

            <div class="statistics" id="statistics">
                <!-- Статистика будет добавляться через JS -->

    </div>

        // Новые функции
        function openTab(tabName) {
            // Скрыть все вкладки
            document.querySelectorAll('.tab-content').forEach(tab => {
                tab.classList.remove('active');
            });
            
            // Показать выбранную вкладку
            document.getElementById(tabName).classList.add('active');
            
            // Обновить активные табы
            document.querySelectorAll('.tab').forEach(tab => {
                tab.classList.remove('active');
                if (tab.textContent.toLowerCase().includes(tabName)) {
                    tab.classList.add('active');
                }
            });
        }

        function initSeedShop() {

            shopEl.innerHTML = '';
            
            game.seeds.forEach(seed => {

                    <h3>${seed.name}</h3>
                    <p>Цена: ${seed.price}💰</p>
                    <p>Время роста: ${seed.growTime}сек</p>
                    <p>Доход: ${seed.value}💰</p>

</html>
