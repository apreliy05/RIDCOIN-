<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Фермерская игра</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background: linear-gradient(to bottom, #ffeb3b, #ff9800); /* Яркий солнечный градиент */
            background-size: cover;
            color: black;
            transition: background 1s ease-in-out;
            overflow: hidden;
        }
        #game-container {
            border: 2px solid #4caf50;
            padding: 20px;
            margin: 20px auto;
            width: 300px;
            background-color: white;
            transition: transform 0.3s ease-in-out;
        }
        button {
            padding: 10px;
            margin: 5px;
            background-color: #4caf50;
            color: white;
            border: none;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: #45a049;
        }

        /* Анимация солнечных лучей */
        .sun-rays {
            position: fixed;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(255,255,255,0.3) 20%, rgba(255,255,255,0) 80%);
            animation: shine 5s infinite alternate;
        }

        /* Плавное мерцание солнца */
        @keyframes shine {
            0% { opacity: 0.5; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>
    <h1>Фермерская игра 🌞🔥</h1>
    <audio id="music" loop>
        <source src="farm_music.mp3" type="audio/mpeg">
    </audio>
    <div class="sun-rays"></div> <!-- Эффект солнечных лучей -->
    <div id="game-container">
        <p>Ресурсы: <span id="resources">100</span> монет</p>
        <p>Урожай: <span id="crops">0</span></p>
        <p>Животные: Коров <span id="cows">0</span>, Кур <span id="chickens">0</span></p>
        <button onclick="playMusic()">🎵 Включить музыку</button>
        <button onclick="plant()">🌱 Посадить растение (-10 монет)</button>
        <button onclick="harvest()">🌾 Собрать урожай (+20 монет)</button>
        <button onclick="buyCow()">🐮 Купить корову (-30 монет)</button>
        <button onclick="buyChicken()">🐔 Купить курицу (-15 монет)</button>
        <button onclick="sell()">💰 Продать продукцию (+30 монет)</button>
        <p id="status">Ожидание действий...</p>
    </div>

    <script>
        let resources = 100;
        let crops = 0;
        let cows = 0;
        let chickens = 0;
        let music = document.getElementById("music");

        function playMusic() {
            music.play();
            updateUI("Музыка включена! 🎵");
        }

        function plant() {
            if (resources >= 10) {
                resources -= 10;
                crops += 1;
                animateAction();
                updateUI("Вы посадили растение! 🌱");
            } else {
                updateUI("Недостаточно монет!");
            }
        }

        function harvest() {
            if (crops > 0) {
                crops -= 1;
                resources += 20;
                animateAction();
                updateUI("Вы собрали урожай! 🌾");
            } else {
                updateUI("Нет урожая для сбора!");
            }
        }

        function buyCow() {
            if (resources >= 30) {
                resources -= 30;
                cows += 1;
                animateAction();
                updateUI("Вы купили корову! 🐮 Теперь можно получать молоко.");
            } else {
                updateUI("Недостаточно монет для коровы!");
            }
        }

        function buyChicken() {
            if (resources >= 15) {
                resources -= 15;
                chickens += 1;
                animateAction();
                updateUI("Вы купили курицу! 🐔 Теперь можно собирать яйца.");
            } else {
                updateUI("Недостаточно монет для курицы!");
            }
        }

        function sell() {
            if (resources >= 30) {
                resources += 30;
                animateAction();
                updateUI("Вы продали продукцию! 💰");
            } else {
                updateUI("Нет продукции для продажи!");
            }
        }

        function updateUI(message) {
            document.getElementById("resources").innerText = resources;
            document.getElementById("crops").innerText = crops;
            document.getElementById("cows").innerText = cows;
            document.getElementById("chickens").innerText = chickens;
            document.getElementById("status").innerText = message;
        }

        function animateAction() {
            document.getElementById("game-container").style.transform = "scale(1.1)";
            setTimeout(() => {
                document.getElementById("game-container").style.transform = "scale(1)";
            }, 300);
        }
    </script>
</body>
