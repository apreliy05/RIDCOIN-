<!DOCTYPE html>
<html>
<head>
    <title>ОСОФЕРМ: Игра-ферма</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #e8f5e9;
            margin: 0;
            padding: 20px;
            text-align: center;
        }
        #game-container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
        }
        h1 {
            color: #2e7d32;
        }
        .farm {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin: 20px 0;
        }
        .plot {
            height: 120px;
            background: #c8e6c9;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }
        .plant {
            width: 80px;
            height: 80px;
            transition: all 0.3s;
        }
        .progress-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            height: 5px;
            background: #388e3c;
            width: 0%;
        }
        .water-btn {
            background: #2196f3;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            margin: 10px;
        }
        .water-btn:disabled {
            background: #bbdefb;
            cursor: not-allowed;
        }
        .stats {
            display: flex;
            justify-content: space-around;
            margin: 20px 0;
        }
        .stat {
            background: #f1f8e9;
            padding: 10px;
            border-radius: 5px;
            min-width: 100px;
        }
        .message {
            margin: 15px 0;
            padding: 10px;
            background: #fff9c4;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <div id="game-container">
        <h1>ОСОФЕРМ</h1>
        <p>Соберите больше 2т, чтобы получить награду!</p>
        
        <div class="stats">
            <div class="stat">
                <div>💧 Вода</div>
                <div id="water-count">4/4</div>
            </div>
            <div class="stat">
                <div>🌱 Урожай</div>
                <div id="harvest">0 г</div>
            </div>
            <div class="stat">
                <div>⏱️ Восстановление</div>
                <div id="water-timer">00:01:00</div>
            </div>
        </div>
        
        <button class="water-btn" id="water-all">Полить все (1 вода)</button>
        
        <div class="message" id="message">Нажмите на грядку, чтобы посадить растение!</div>
        
        <div class="farm" id="farm">
            <!-- Грядки будут созданы через JavaScript -->
        </div>
    </div>

    <script>
        // Состояние игры
        const game = {
            water: 4,
            maxWater: 4,
            harvest: 0,
            plants: [],
            waterTimer: 60, // 1 минута
            growthStages: [
                { name: "Семечко", img: "🌱", growth: 0 },
                { name: "Росток", img: "🌿", growth: 0.3 },
                { name: "Растение", img: "🌾", growth: 0.7 },
                { name: "Урожай", img: "🍅", growth: 1 }
            ]
        };

        // Элементы интерфейса
        const farmEl = document.getElementById('farm');
        const waterCountEl = document.getElementById('water-count');
        const harvestEl = document.getElementById('harvest');
        const waterTimerEl = document.getElementById('water-timer');
        const messageEl = document.getElementById('message');
        const waterAllBtn = document.getElementById('water-all');

        // Создаем грядки
        for (let i = 0; i < 9; i++) {
            const plot = document.createElement('div');
            plot.className = 'plot';
            plot.innerHTML = '<div class="progress-bar"></div>';
            plot.onclick = () => plantSeed(i);
            farmEl.appendChild(plot);
            game.plants.push({ stage: -1, progress: 0, element: plot });
        }

        // Посадить семечко
        function plantSeed(index) {
            if (game.plants[index].stage === -1) {
                game.plants[index] = { 
                    stage: 0, 
                    progress: 0, 
                    element: game.plants[index].element 
                };
                updatePlant(index);
                showMessage("Семечко посажено! Поливайте для роста.");
            } else if (game.plants[index].stage === 3) {
                harvestPlant(index);
            }
        }

        // Полить растение
        function waterPlant(index) {
            if (game.water > 0 && game.plants[index].stage !== -1 && game.plants[index].stage < 3) {
                game.water--;
                game.plants[index].progress += 0.2 + Math.random() * 0.1;
                updateWater();
                updatePlant(index);
                
                if (game.plants[index].progress >= 1) {
                    game.plants[index].stage++;
                    game.plants[index].progress = 0;
                }
            }
        }

        // Полить все растения
        function waterAll() {
            if (game.water > 0) {
                for (let i = 0; i < game.plants.length; i++) {
                    if (game.plants[i].stage !== -1 && game.plants[i].stage < 3) {
                        waterPlant(i);
                    }
                }
                showMessage("Все растения политы!");
            }
        }

        // Собрать урожай
        function harvestPlant(index) {
            const plant = game.plants[index];
            const harvestAmount = 300 + Math.floor(Math.random() * 200); // 300-500г
            game.harvest += harvestAmount;
            plant.stage = -1;
            plant.progress = 0;
            updatePlant(index);
            updateHarvest();
            showMessage(`Собрано ${harvestAmount}г урожая!`);
            
            // Проверка победы
            if (game.harvest >= 2000) {
                showMessage("🎉 Поздравляем! Вы собрали 2т урожая и выиграли!");
            }
        }

        // Обновить отображение растения
        function updatePlant(index) {
            const plant = game.plants[index];
            const plot = plant.element;
            
            if (plant.stage === -1) {
                plot.innerHTML = '<div class="progress-bar"></div><div>🪴</div>';
            } else {
                const stage = game.growthStages[plant.stage];
                plot.innerHTML = `
                    <div class="progress-bar" style="width:${plant.progress * 100}%"></div>
                    <div class="plant">${stage.img}</div>
                `;
            }
        }

        // Обновить счетчик воды
        function updateWater() {
            waterCountEl.textContent = `${game.water}/${game.maxWater}`;
            waterAllBtn.disabled = game.water === 0;
        }

        // Обновить счетчик урожая
        function updateHarvest() {
            harvestEl.textContent = `${game.harvest} г`;
        }

        // Показать сообщение
        function showMessage(text) {
            messageEl.textContent = text;
        }

        // Таймер восстановления воды
        function updateWaterTimer() {
            game.waterTimer--;
            
            if (game.waterTimer <= 0) {
                game.water = Math.min(game.water + 1, game.maxWater);
                game.waterTimer = 60;
                updateWater();
            }
            
            const mins = Math.floor(game.waterTimer / 60);
            const secs = game.waterTimer % 60;
            waterTimerEl.textContent = `00:${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        }

        // Назначение кнопок
        waterAllBtn.onclick = waterAll;
        updateWater();

        // Игровой цикл
        setInterval(updateWaterTimer, 1000);
    </script>
</body>
</html>
