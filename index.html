<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RIDCOIN - Игра Beekeeper</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background: #1a1a1a;
            color: white;
        }
        
        .game-container {
            max-width: 800px;
            margin: 20px auto;
            padding: 20px;
            background: #333;
            border-radius: 10px;
        }
        
        .game-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
        }
        
        .resource {
            background: #444;
            padding: 10px;
            border-radius: 5px;
            margin: 5px;
            display: inline-block;
        }
        
        .apiary {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 10px;
            margin: 20px 0;
        }
        
        .hive {
            background: #555;
            border: 2px solid #f39c12;
            border-radius: 8px;
            padding: 10px;
            text-align: center;
            cursor: pointer;
        }
        
        .hive.selected {
            background: #3a3a3a;
            box-shadow: 0 0 10px #f39c12;
        }
        
        .btn {
            background: #f39c12;
            color: white;
            border: none;
            padding: 10px 15px;
            margin: 5px;
            border-radius: 5px;
            cursor: pointer;
        }
        
        .btn:disabled {
            background: #666;
            cursor: not-allowed;
        }
        
        .events-log {
            height: 200px;
            overflow-y: auto;
            background: #222;
            padding: 10px;
            border-radius: 5px;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="game-header">
            <h1>Beekeeper</h1>
            <div>
                <div class="resource">🍯 Мёд: <span id="honey-count">0</span></div>
                <div class="resource">🪙 Монеты: <span id="coins-count">100</span></div>
            </div>
        </div>
        
        <div class="apiary" id="apiary">
            <!-- Ульи будут здесь -->
        </div>
        
        <div>
            <button class="btn" id="buy-hive">Купить улей (50 🪙)</button>
            <button class="btn" id="collect-honey" disabled>Собрать мёд</button>
            <button class="btn" id="sell-honey" disabled>Продать мёд (10 🪙/🍯)</button>
            <button class="btn" id="upgrade-hive" disabled>Улучшить улей (100 🪙)</button>
        </div>
        
        <div class="events-log" id="game-events">
            <div>Добро пожаловать в игру Beekeeper!</div>
        </div>
    </div>

    <script>
        // Игровое состояние
        const gameState = {
            honey: 0,
            coins: 100,
            hives: [],
            selectedHive: null,
            hivePrice: 50,
            honeyPrice: 10,
            upgradePrice: 100
        };

        // Элементы интерфейса
        const apiaryElement = document.getElementById('apiary');
        const honeyCountElement = document.getElementById('honey-count');
        const coinsCountElement = document.getElementById('coins-count');
        const buyHiveButton = document.getElementById('buy-hive');
        const collectHoneyButton = document.getElementById('collect-honey');
        const sellHoneyButton = document.getElementById('sell-honey');
        const upgradeHiveButton = document.getElementById('upgrade-hive');
        const gameEventsElement = document.getElementById('game-events');

        // Функции игры
        function addEvent(message) {
            const eventElement = document.createElement('div');
            eventElement.textContent = message;
            gameEventsElement.prepend(eventElement);
            
            if (gameEventsElement.children.length > 20) {
                gameEventsElement.removeChild(gameEventsElement.lastChild);
            }
        }

        function updateUI() {
            honeyCountElement.textContent = gameState.honey;
            coinsCountElement.textContent = gameState.coins;
            
            buyHiveButton.textContent = `Купить улей (${gameState.hivePrice} 🪙)`;
            buyHiveButton.disabled = gameState.coins < gameState.hivePrice;
            
            sellHoneyButton.disabled = gameState.honey < 1;
            collectHoneyButton.disabled = gameState.selectedHive === null;
            upgradeHiveButton.disabled = gameState.selectedHive === null || gameState.coins < gameState.upgradePrice;
        }

        function renderHives() {
            apiaryElement.innerHTML = '';
            
            if (gameState.hives.length === 0) {
                apiaryElement.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:20px;">Купите первый улей</div>';
                return;
            }
            
            gameState.hives.forEach((hive, index) => {
                const hiveElement = document.createElement('div');
                hiveElement.className = `hive ${gameState.selectedHive === index ? 'selected' : ''}`;
                hiveElement.innerHTML = `
                    <div style="font-size:24px;">🐝</div>
                    <div>Улей #${index + 1}</div>
                    <div>Уровень ${hive.level}</div>
                `;
                
                hiveElement.addEventListener('click', () => {
                    gameState.selectedHive = index;
                    renderHives();
                    updateUI();
                    addEvent(`Выбран улей #${index + 1}`);
                });
                
                apiaryElement.appendChild(hiveElement);
            });
        }

        function produceHoney() {
            gameState.hives.forEach(hive => {
                gameState.honey += hive.level * 0.5;
            });
            updateUI();
        }

        // Обработчики событий
        buyHiveButton.addEventListener('click', () => {
            if (gameState.coins >= gameState.hivePrice) {
                gameState.coins -= gameState.hivePrice;
                gameState.hives.push({ level: 1 });
                gameState.hivePrice = Math.floor(gameState.hivePrice * 1.2);
                
                if (gameState.hives.length === 1) {
                    gameState.selectedHive = 0;
                }
                
                addEvent(`Куплен новый улей за ${gameState.hivePrice} 🪙`);
                renderHives();
                updateUI();
            }
        });

        collectHoneyButton.addEventListener('click', () => {
            if (gameState.selectedHive !== null) {
                const collected = gameState.hives[gameState.selectedHive].level * 2;
                gameState.honey += collected;
                addEvent(`Собрано ${collected} 🍯 с улья #${gameState.selectedHive + 1}`);
                updateUI();
            }
        });

        sellHoneyButton.addEventListener('click', () => {
            if (gameState.honey > 0) {
                const earned = gameState.honey * gameState.honeyPrice;
                gameState.coins += earned;
                addEvent(`Продано ${gameState.honey} 🍯 за ${earned} 🪙`);
                gameState.honey = 0;
                updateUI();
            }
        });

        upgradeHiveButton.addEventListener('click', () => {
            if (gameState.selectedHive !== null && gameState.coins >= gameState.upgradePrice) {
                const hive = gameState.hives[gameState.selectedHive];
                gameState.coins -= gameState.upgradePrice;
                hive.level += 1;
                gameState.upgradePrice = Math.floor(gameState.upgradePrice * 1.5);
                
                addEvent(`Улей #${gameState.selectedHive + 1} улучшен до уровня ${hive.level}`);
                renderHives();
                updateUI();
            }
        });

        // Инициализация игры
        function initGame() {
            updateUI();
            renderHives();
            
            // Автоматическое производство мёда
            setInterval(produceHoney, 3000);
            
            addEvent("Игра началась! Купите первый улей.");
        }

        // Запуск игры
        window.onload = initGame;
    </script>
</body>
</html>
